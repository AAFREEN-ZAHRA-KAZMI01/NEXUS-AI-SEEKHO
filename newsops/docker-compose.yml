version: "3.9"

services:

  newsops-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: newsops-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=sqlite+aiosqlite:////app/data/newsops.db
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DEBUG=${DEBUG:-false}
    volumes:
      - newsops-data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - newsops-network

volumes:
  newsops-data:
    driver: local

networks:
  newsops-network:
    driver: bridge
